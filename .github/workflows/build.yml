name: Crear Releases de Comentia

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Compilar para Windows, Linux y macOS
  build-python:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: windows
            os: windows-latest
            ext: .exe
          - target: linux
            os: ubuntu-latest
            ext: ''
          - target: macos
            os: macos-latest
            ext: ''
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar dependencias
        run: |
          pip install pyinstaller requests PyQt5
      
      - name: Compilar para ${{ matrix.target }}
        run: |
          pyinstaller --onefile --windowed \
            --name Comentia_${{ matrix.target }} \
            --add-data "src/comentia:comentia" \
            --hidden-import PyQt5 \
            qt_app/main.py
      
      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Comentia-${{ matrix.target }}
          path: dist/Comentia_${{ matrix.target }}${{ matrix.ext }}

  # Crear la release
  crear-release:
    needs: build-python
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: archivos
      
      - name: Organizar archivos
        run: |
          mkdir release_files
          find archivos -type f -name "Comentia-*" -exec cp {} release_files/ \;
          ls -la release_files/
      
      - name: Publicar release
        uses: softprops/action-gh-release@v1
        with:
          files: release_files/*
          draft: false
          prerelease: false
          generate_release_notes: true