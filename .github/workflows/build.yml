name: Build and Release Comentia

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            suffix: .exe
            artifact_name: Comentia-windows
          - os: macos-latest
            suffix: ''
            artifact_name: Comentia-macos
          - os: ubuntu-latest
            suffix: ''
            artifact_name: Comentia-linux
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller PyQt5 requests

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed \
            --name ${{ matrix.artifact_name }} \
            --add-data "src/comentia:comentia" \
            --hidden-import PyQt5 \
            qt_app/main.py

      - name: Upload artifact (Executable)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true