<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Comentia - Extractor de comentarios</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Comentia</h1>
            <p>Extractor de comentarios de Marca.com</p>
        </header>

        <div class="main-content">
            <div class="input-section">
                <label for="url">URL de la noticia:</label>
                <input type="text" id="url" placeholder="https://www.marca.com/..." />
                <button id="selectDirBtn">📁 Seleccionar carpeta</button>
                <div id="directoryDisplay" class="directory-display"></div>
                <button id="extractBtn" disabled>🚀 Extraer comentarios</button>
            </div>

            <div class="progress-section" id="progressSection" style="display: none;">
                <h3>Progreso:</h3>
                <div class="progress-bar-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
                <div class="progress-log" id="progressLog"></div>
            </div>

            <div class="result-section" id="resultSection" style="display: none;">
                <h3>✅ ¡Completado!</h3>
                <div id="resultMessage"></div>
            </div>
        </div>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
